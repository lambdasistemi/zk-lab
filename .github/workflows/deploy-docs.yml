name: Build and deploy documentation

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Docs
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build docs
        run: nix run --quiet .#docs-build

      - name: Deploy PR preview to surge.sh
        if: github.event_name == 'pull_request'
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: >-
          nix shell nixpkgs#nodejs --quiet -c
          npx --yes surge ./site
          lambdasistemi-zk-lab-pr-${{ github.event.number }}.surge.sh

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        run: nix run --quiet .#docs-deploy

      # Post-deploy smoke test (T050): the parity matrix is the
      # discovery surface for the zk-lab DSL. If it 404s, the site
      # is useless. gh-pages takes a few seconds to propagate, so
      # retry briefly before failing the job.
      - name: Smoke-test parity-matrix page
        if: github.ref == 'refs/heads/main'
        run: |
          url=https://lambdasistemi.github.io/zk-lab/dsl/parity-matrix/
          for attempt in 1 2 3 4 5 6; do
            body=$(curl -fsS "$url" || true)
            if [[ -n "$body" ]] && grep -qi 'set.membership' <<<"$body"; then
              echo "smoke-test: OK ($url)"
              exit 0
            fi
            echo "smoke-test: attempt $attempt failed, retrying..."
            sleep 10
          done
          echo "smoke-test: FAIL — $url unreachable or missing set-membership" >&2
          exit 1
